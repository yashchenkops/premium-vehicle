<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script type="module" src="./src/main.js"></script>
    <title>Premium Vehicle</title>
  </head>
  <body>
    <header class="header">
      <div class="header__container">
        <div class="header__wrapper">
          <button class="header__burger">
            <span></span>
            <span></span>
            <span></span>
          </button>
          <a href="#" class="header__logo">
            <img src="./logo.svg" alt="" />
          </a>
        </div>
      </div>
    </header>
    <main class="main">
      <section class="hero">
        <div class="section__container">
          <h1 class="section-title">Premium Vehicle</h1>
          <p class="section-subtitle">Marketing Studio</p>
          <div class="hero__wrapper">
            <div class="hero__wrapper-description">
              <div class="description__images">
                <img src="./hero-description-1.webp" alt="Seat" />
                <img src="./hero-description-2.webp" alt="Car panel" />
                <img src="./hero-description-3.webp" alt="Steering wheel" />
              </div>
              <p class="description__text">
                A curated selection of premium vehicles available for use in our advertising and production projects.
              </p>
            </div>
            <div class="hero__wrapper-illustration">
              <div class="illustration-description">
                <p>let <span>your</span> brand</p>
                <p>take <span>the</span> lead</div></p>
              <div class="illustration-car">
                <img src="./hero-car.webp" alt="Car" />
              </div>
            </div>
          </div>
        </div>
      </section>
      <section class="about">
        <div class="scene">
          <div class="bg"></div>
          <div class="overlay"></div>
          <img class="car" src="./about-car.png" />
        </div>
      </section>
    </main>
    <footer class="footer"></footer>
  </body>
</html>
